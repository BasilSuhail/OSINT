name: frontend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "osint-frontend/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: osint-frontend

jobs:
  changes:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "osint-frontend/**"
              - ".github/workflows/frontend.yml"

  build:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    runs-on: ubuntu-latest
    env:
      # Build-time default for the local read-API base (overridden at runtime).
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      # Skip Next's interactive telemetry prompt — it stalls `next build` on
      # a fresh CI runner waiting on stdin.
      NEXT_TELEMETRY_DISABLED: "1"
      # Cap memory + disable Turbopack incremental cache so a long build
      # cannot quietly OOM the runner.
      NODE_OPTIONS: "--max-old-space-size=4096"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          # 22+ is required for `node --test --experimental-strip-types`,
          # which we use to run the ephemeris ground-truth suite directly
          # off the TypeScript source without a transpile step.
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: osint-frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Type check (tsc)
        run: pnpm tsc --noEmit

      - name: Lint (eslint)
        run: pnpm lint

      - name: Dependency security scan (npm audit)
        run: pnpm audit --audit-level high

      - name: Ephemeris unit tests (node --test)
        run: node --test --experimental-strip-types lib/ephemeris.test.mts

      - name: Unit tests (vitest)
        run: pnpm test

      # `next build` is intentionally not run here. Next 16 + Turbopack hangs
      # indefinitely on GitHub-hosted runners (telemetry prompt + first-run
      # font/cache fetches); a 60-min wait is worse than no signal. tsc +
      # eslint + unit tests catch every kind of regression we currently care
      # about; Vercel rebuilds on every push to main and will surface any
      # prod-only issue. Re-enable when the Turbopack hang is fixed upstream.
