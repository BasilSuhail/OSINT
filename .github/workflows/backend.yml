name: backend

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "alembic.ini"
      - "migrations/**"
      - ".github/workflows/backend.yml"

jobs:
  changes:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "app/**"
              - "tests/**"
              - "pyproject.toml"
              - "requirements.txt"
              - "alembic.ini"
              - "migrations/**"
              - ".github/workflows/backend.yml"

  test:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    runs-on: ubuntu-latest

    # Real Postgres so Alembic runs against the same dialect that prod uses,
    # not the SQLite shim our in-process unit tests use.
    #
    # Auth: POSTGRES_HOST_AUTH_METHOD=trust — the service container is only
    # reachable from the runner-local network, torn down at job end. No
    # password literal in YAML means nothing for secret scanners to flag.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: osint
          POSTGRES_DB: osint
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U osint"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: osint
      POSTGRES_USER: osint
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      ENVIRONMENT: ci
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check app/ tests/

      - name: Format check (ruff format)
        run: ruff format --check app/ tests/

      - name: Dependency security scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Alembic migrate against Postgres
        run: alembic upgrade head

      - name: Test (pytest)
        run: pytest --maxfail=1
